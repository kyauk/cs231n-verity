services:
  db:
    image: pgvector/pgvector:pg16
    container_name: triage-refinery-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d

  api:
    image: python:3.11-slim
    container_name: triage-refinery-api
    working_dir: /app/backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: triage-refinery-frontend
    working_dir: /app/frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      - ./:/app
    command: >
      sh -c "echo 'Frontend placeholder service for future features.' &&
      tail -f /dev/null"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
